  push-lockfile:
    runs-on: ubuntu-latest
    needs: [update-lockfile, build-macos-aarch64, build-linux-x86_64, build-linux-aarch64]

    # If every target builds successfully on both Linux and Macos, update is
    # good and we can push.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: flake.lock

      - name: Push update lockfile
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git add ./flake.lock
          git commit -m "Automatic lockfile update." | true
          git push origin main
