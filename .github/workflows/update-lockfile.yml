name: Automatic lockfile update
on:
  schedule:
    - cron: '39 0 * * 6'
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest

    steps:
      - uses: DeterminateSystems/nix-installer-action@main

      - uses: actions/checkout@v6

      - name: Update flake lockfile
        run: nix flake update

      - name: Send lockfile to next jobs
        uses: actions/upload-artifact@v7
        with:
          name: flake.lock
          path: flake.lock

  build-bevy-breakout:
    strategy:
      matrix:
        system: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]

    env:
      BEVY_VERSION: 0.19.0

    runs-on: ${{ matrix.system }}
    needs: [update-lockfile]

    name: |-
      build-${{ case(
        matrix.system == 'ubuntu-latest', 'x86_64-linux',
        matrix.system == 'ubuntu-24.04-arm', 'aarch64-linux',
        matrix.system == 'macos-latest', 'aarch64-darwin',
        'unknown-system'
      ) }}

    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - uses: actions/checkout@v6
        with:
          path: bevy-flake

      - uses: actions/download-artifact@v8
        with:
          name: flake.lock
          path: bevy-flake

      - name: Clean lock in bevy-flake
        working-directory: bevy-flake
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git add ./flake.lock
          git commit -m "Fetched updated lock." | true

      - name: Get bevy repo with lockfile from crates.io
        run: |
          curl -L -o download "https://static.crates.io/crates/bevy/bevy-$BEVY_VERSION.crate"
          tar -xf download
          rm download
          mv "bevy-$BEVY_VERSION" bevy

      - name: Add toolchian from 'fenix' template to runner.
        working-directory: bevy
        run: |
          nix flake init --template ../bevy-flake#fenix
          nix flake lock \
            --reference-lock-file ../bevy-flake/flake.lock \
            --override-input bevy-flake ../bevy-flake
          nix profile add .#rust-toolchain

      - name: Build Breakout example for runner in dev environment.
        working-directory: bevy
        run: |
          cargo build --example breakout
          cargo clean --profile dev

      - name: Build Breakout example for aarch64-pc-windows-msvc.
        working-directory: bevy
        run: |
          cargo build --target aarch64-pc-windows-msvc --example breakout
          cargo clean --target aarch64-pc-windows-msvc

      - name: Build Breakout example for x86_64-pc-windows-msvc.
        working-directory: bevy
        run: |
          cargo build --target x86_64-pc-windows-msvc --example breakout
          cargo clean --target x86_64-pc-windows-msvc

      - name: Build Breakout example for aarch64-unknown-linux-gnu.
        working-directory: bevy
        run: |
          cargo build --target aarch64-unknown-linux-gnu --example breakout
          cargo clean --target aarch64-unknown-linux-gnu

      - name: Build Breakout example for x86_64-unknown-linux-gnu.
        working-directory: bevy
        run: |
          cargo build --target x86_64-unknown-linux-gnu --example breakout
          cargo clean --target x86_64-unknown-linux-gnu

      - name: Build Breakout example for wasm32-unknown-unknown.
        working-directory: bevy
        run: |
          cargo build --target wasm32-unknown-unknown --example breakout
          cargo clean --target wasm32-unknown-unknown

  push-lockfile:
    runs-on: ubuntu-latest
    needs: [update-lockfile, build-bevy-breakout]

    # If every target builds successfully on both Linux and Macos, update is
    # good and we can push.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: flake.lock

      - name: Push update lockfile
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git add ./flake.lock
          git commit -m "Automatic lockfile update." | true
          git push origin main
