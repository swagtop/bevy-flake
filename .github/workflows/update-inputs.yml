name: Automatic lockfile update.
on:
  schedule:
    - cron: '39 0 * * 6'
  workflow_dispatch:

jobs:
  update-inputs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: update flake lockfile
        run: nix flake update
      
      - name: clone bevy repo
        run: git clone https://github.com/bevyengine/bevy.git bevy -b release-0.18.1

      - name: pull fenix template, follow local bevy-flake
        working-directory: bevy
        run: |
          nix flake init --template ..#fenix
          nix flake lock ../.
          nix flake lock --override-input bevy-flake ../.

      - name: build breakout for x86_64-pc-windows-msvc
        working-directory: bevy
        run: |
          nix run .#rust-toolchain build -- --example breakout --target x86_64-pc-windows-msvc

      - name: build breakout for x86_64-unknown-linux-gnu
        working-directory: bevy
        run: |
          nix run .#rust-toolchain build -- --example breakout --target x86_64-unknown-linux-gnu

      - name: build breakout for aarch64-apple-darwin
        working-directory: bevy
        run: |
          nix run .#rust-toolchain build -- --example breakout --target aarch64-apple-darwin

      - name: build breakout for wasm32-unknown-unknown
        working-directory: bevy
        run: |
          nix run .#rust-toolchain build -- --example breakout --target wasm32-unknown-unknown
        
      - name: push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git add ./flake.lock
          git commit -m "Automatic lockfile update." | true
          git push origin main
